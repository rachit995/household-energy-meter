name: Energy Meter Scraper

on:
  # Report runs:
  #   Morning:   1:00 AM UTC  (6:30 AM IST)
  #   Afternoon: 12:00 PM UTC (5:30 PM IST)
  #   Evening:   4:30 PM UTC  (10:00 PM IST)
  #
  # Snapshot runs (Phase 2): every 20 minutes. Originally 10-min, but GHA
  # free-tier throttling delivers only ~2-3 runs/hour regardless. Switching
  # to 20-min aligns with what GHA actually grants and reduces wasted queue
  # pressure. Offset by 5 to avoid colliding with report crons on :00/:30.
  schedule:
    - cron: '5,25,45 * * * *'
    - cron: '0 1 * * *'
    - cron: '0 12 * * *'
    - cron: '30 16 * * *'

  # Allow manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scraper mode'
        required: false
        default: 'morning'
        type: choice
        options:
          - morning
          - afternoon
          - evening
          - snapshot
      weekly:
        description: 'Include weekly report'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      monthly:
        description: 'Include monthly report'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Determine scraper mode
        id: mode
        # Map the triggering event/schedule to a SCRAPER_MODE. The snapshot
        # cron (every 20 min, offset to :05/:25/:45) never collides with
        # the report crons on :00 or :30, so these branches are disjoint.
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
            echo "weekly=${{ github.event.inputs.weekly }}" >> $GITHUB_OUTPUT
            echo "monthly=${{ github.event.inputs.monthly }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "5,25,45 * * * *" ]; then
            # Phase 2: 20-min snapshot. Saves one readings row, runs the
            # alert engine, no reports or daily-aggregate churn.
            echo "mode=snapshot" >> $GITHUB_OUTPUT
            echo "weekly=false" >> $GITHUB_OUTPUT
            echo "monthly=false" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 12 * * *" ]; then
            echo "mode=afternoon" >> $GITHUB_OUTPUT
            echo "weekly=false" >> $GITHUB_OUTPUT
            echo "monthly=false" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 16 * * *" ]; then
            echo "mode=evening" >> $GITHUB_OUTPUT
            echo "weekly=false" >> $GITHUB_OUTPUT
            echo "monthly=false" >> $GITHUB_OUTPUT
          else
            echo "mode=morning" >> $GITHUB_OUTPUT
            # Send weekly report on Mondays
            if [ "$(date -u +%u)" = "1" ]; then
              echo "weekly=true" >> $GITHUB_OUTPUT
            else
              echo "weekly=false" >> $GITHUB_OUTPUT
            fi
            # Send monthly report on 1st of month
            if [ "$(date -u +%d)" = "01" ]; then
              echo "monthly=true" >> $GITHUB_OUTPUT
            else
              echo "monthly=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run scraper
        # All user-identifying/PII values are passed as SECRETS (auto-masked
        # in public action logs). GitHub Actions Variables would render as
        # plaintext in logs — avoid for anything that could identify a user.
        env:
          SMARTGRID_SITE_ID: ${{ secrets.SMARTGRID_SITE_ID }}
          SMARTGRID_UNIT_ID: ${{ secrets.SMARTGRID_UNIT_ID }}
          SMARTGRID_METER_ID: ${{ secrets.SMARTGRID_METER_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SCRAPER_MODE: ${{ steps.mode.outputs.mode }}
          WEEKLY: ${{ steps.mode.outputs.weekly }}
          MONTHLY: ${{ steps.mode.outputs.monthly }}
        run: uv run python scraper/scraper.py
